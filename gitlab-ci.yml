image: python:3

stages:
  - deploy

deploy-job:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == "test" || $CI_COMMIT_BRANCH == "prod"
  script:
    - python -m venv Pipeline/venv
    - source Pipeline/venv/bin/activate
    - pip install -r Pipeline/requirements.txt
    - python Pipeline/pipelineSync.py
